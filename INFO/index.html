<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INFO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
    </style>
</head>
<body>
    <video src="video.mp4" loop playsinline id="bgvid"></video>
    <script>
        const v = document.getElementById('bgvid');
        
        // Start muted
        v.muted = true;
        v.play().then(() => {
            // Try to unmute after a tiny delay (may or may not work)
            setTimeout(() => {
                v.muted = false;
            }, 100);
        }).catch(() => {
            // If it fails, wait for click
            document.addEventListener('click', () => {
                v.muted = false;
                v.play();
            }, { once: true });
        });
    </script>
</body>
</html>
