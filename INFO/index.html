<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verify You're Human</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: none; /* Hidden until captcha is solved */
        }

        video.visible {
            display: block;
        }

        /* Full-screen overlay - blocks EVERYTHING */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Captcha box */
        .captcha-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 60px 50px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to { 
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .captcha-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .captcha-container h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .captcha-container p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        /* The big clickable checkbox */
        .captcha-box {
            position: relative;
            display: inline-block;
            cursor: pointer;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            width: 100%;
            max-width: 300px;
        }

        .captcha-box:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        .captcha-box:active {
            transform: scale(0.97);
        }

        .captcha-box.checked {
            background: rgba(76, 175, 80, 0.15);
            border-color: #4CAF50;
            animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .captcha-box .checkmark {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }

        .captcha-box .checkmark .box {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
        }

        .captcha-box.checked .checkmark .box {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .captcha-box .checkmark .box svg {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .captcha-box.checked .checkmark .box svg {
            opacity: 1;
            transform: scale(1);
        }

        .captcha-box .checkmark .text {
            transition: all 0.3s ease;
        }

        .captcha-box.checked .checkmark .text {
            color: #4CAF50;
        }

        /* Loading spinner while video loads */
        .loading {
            display: none;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .loading.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .captcha-container {
                padding: 40px 24px;
                margin: 16px;
            }
            
            .captcha-container h1 {
                font-size: 22px;
            }
            
            .captcha-container p {
                font-size: 14px;
            }

            .captcha-box {
                padding: 16px 24px;
                max-width: 100%;
            }

            .captcha-box .checkmark {
                font-size: 16px;
                justify-content: center;
            }
        }

        /* Hide overlay when captcha is solved */
        .overlay.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <video src="video.mp4" loop playsinline id="bgvid"></video>

    <!-- Full-screen Captcha Overlay -->
    <div class="overlay" id="overlay">
        <div class="captcha-container">
            <span class="captcha-icon">🤖</span>
            <h1>Verify You're Human</h1>
            <p>Please complete the verification below to continue.</p>
            
            <!-- The big clickable captcha box -->
            <div class="captcha-box" id="captchaBox">
                <span class="checkmark">
                    <span class="box">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </span>
                    <span class="text">I'm not a robot</span>
                </span>
            </div>
            
            <div class="loading" id="loading">⏳ Verifying... Please wait</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('bgvid');
        const overlay = document.getElementById('overlay');
        const captchaBox = document.getElementById('captchaBox');
        const loading = document.getElementById('loading');

        // IMPORTANT: Video starts completely hidden and not playing
        v.pause();
        v.currentTime = 0;
        v.muted = false; // Will be unmuted from the start

        // Captcha click handler
        captchaBox.addEventListener('click', function(e) {
            e.stopPropagation();
            
            // Add checked state
            this.classList.add('checked');
            
            // Show loading
            loading.classList.add('show');
            
            // Disable further clicks
            this.style.pointerEvents = 'none';
            
            // Simulate verification delay (makes it feel real)
            setTimeout(() => {
                // Show the video
                v.classList.add('visible');
                
                // Play unmuted
                v.play().then(() => {
                    console.log('🎵 Human verified! Enjoy the video! 🎵');
                }).catch(err => {
                    console.warn('Playback failed:', err);
                    // If unmuted fails, try muted as fallback
                    v.muted = true;
                    v.play();
                });
                
                // Hide the overlay with animation
                overlay.style.transition = 'opacity 0.6s ease';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 600);
                
                // Hide loading
                loading.classList.remove('show');
            }, 1500); // 1.5 second "verification" delay
        });

        // Prevent clicking on overlay from doing anything
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                // Do nothing - force user to click the captcha
            }
        });

        console.log('🤖 Captcha ready - click the box to verify you\'re human!');
        console.log('🎵 Rickroll incoming...');
    </script>
</body>
</html>
